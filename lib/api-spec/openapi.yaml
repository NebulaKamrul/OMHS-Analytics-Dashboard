openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ontario Mental Health Services Analytics API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analytics
    description: Dashboard analytics endpoints
  - name: filters
    description: Filter option endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /filters/counties:
    get:
      operationId: getFilterCounties
      tags: [filters]
      summary: List distinct counties
      responses:
        "200":
          description: List of county names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /filters/taxonomy-terms:
    get:
      operationId: getFilterTaxonomyTerms
      tags: [filters]
      summary: List distinct taxonomy terms
      responses:
        "200":
          description: List of taxonomy term names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /analytics/kpis:
    get:
      operationId: getAnalyticsKpis
      tags: [analytics]
      summary: Dashboard KPI cards
      parameters:
        - $ref: "#/components/parameters/county"
        - $ref: "#/components/parameters/taxonomyTerm"
        - $ref: "#/components/parameters/bilingual"
        - $ref: "#/components/parameters/lgbtq"
        - $ref: "#/components/parameters/harmReduction"
        - $ref: "#/components/parameters/ageGroup"
        - $ref: "#/components/parameters/gender"
      responses:
        "200":
          description: KPI metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsKpis"

  /analytics/services-by-category:
    get:
      operationId: getServicesByCategory
      tags: [analytics]
      summary: Service count by taxonomy term (top 15)
      parameters:
        - $ref: "#/components/parameters/county"
        - $ref: "#/components/parameters/bilingual"
        - $ref: "#/components/parameters/lgbtq"
        - $ref: "#/components/parameters/harmReduction"
        - $ref: "#/components/parameters/ageGroup"
        - $ref: "#/components/parameters/gender"
      responses:
        "200":
          description: Services grouped by taxonomy category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /analytics/services-by-county:
    get:
      operationId: getServicesByCounty
      tags: [analytics]
      summary: Service count by county (top 20)
      parameters:
        - $ref: "#/components/parameters/taxonomyTerm"
        - $ref: "#/components/parameters/bilingual"
        - $ref: "#/components/parameters/lgbtq"
        - $ref: "#/components/parameters/harmReduction"
        - $ref: "#/components/parameters/ageGroup"
        - $ref: "#/components/parameters/gender"
      responses:
        "200":
          description: Services grouped by county
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CountyCount"

  /analytics/eligibility-by-age:
    get:
      operationId: getEligibilityByAge
      tags: [analytics]
      summary: Service count by age eligibility group
      parameters:
        - $ref: "#/components/parameters/county"
        - $ref: "#/components/parameters/taxonomyTerm"
      responses:
        "200":
          description: Age eligibility distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgeGroupCount"

  /analytics/eligibility-by-gender:
    get:
      operationId: getEligibilityByGender
      tags: [analytics]
      summary: Service count by gender eligibility
      parameters:
        - $ref: "#/components/parameters/county"
        - $ref: "#/components/parameters/taxonomyTerm"
      responses:
        "200":
          description: Gender eligibility distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GenderCount"

  /analytics/language-distribution:
    get:
      operationId: getLanguageDistribution
      tags: [analytics]
      summary: Bilingual vs English-only vs French-only service counts
      parameters:
        - $ref: "#/components/parameters/county"
        - $ref: "#/components/parameters/taxonomyTerm"
      responses:
        "200":
          description: Language distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LanguageCount"

  /analytics/services-report:
    get:
      operationId: getServicesReport
      tags: [analytics]
      summary: Filterable services table for report view
      parameters:
        - $ref: "#/components/parameters/county"
        - $ref: "#/components/parameters/taxonomyTerm"
        - $ref: "#/components/parameters/bilingual"
        - $ref: "#/components/parameters/lgbtq"
        - $ref: "#/components/parameters/harmReduction"
        - $ref: "#/components/parameters/ageGroup"
        - $ref: "#/components/parameters/gender"
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Free-text search on service name
      responses:
        "200":
          description: Filtered service records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceRecord"

components:
  parameters:
    county:
      name: county
      in: query
      required: false
      schema:
        type: string
    taxonomyTerm:
      name: taxonomyTerm
      in: query
      required: false
      schema:
        type: string
    bilingual:
      name: bilingual
      in: query
      required: false
      schema:
        type: string
    lgbtq:
      name: lgbtq
      in: query
      required: false
      schema:
        type: string
    harmReduction:
      name: harmReduction
      in: query
      required: false
      schema:
        type: string
    ageGroup:
      name: ageGroup
      in: query
      required: false
      schema:
        type: string
    gender:
      name: gender
      in: query
      required: false
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    AnalyticsKpis:
      type: object
      properties:
        totalServices:
          type: integer
        totalCounties:
          type: integer
        bilingualServices:
          type: integer
        lgbtqServices:
          type: integer
        harmReductionServices:
          type: integer
      required:
        - totalServices
        - totalCounties
        - bilingualServices
        - lgbtqServices
        - harmReductionServices

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required: [category, count]

    CountyCount:
      type: object
      properties:
        county:
          type: string
        count:
          type: integer
      required: [county, count]

    AgeGroupCount:
      type: object
      properties:
        ageGroup:
          type: string
        count:
          type: integer
      required: [ageGroup, count]

    GenderCount:
      type: object
      properties:
        gender:
          type: string
        count:
          type: integer
      required: [gender, count]

    LanguageCount:
      type: object
      properties:
        language:
          type: string
        count:
          type: integer
      required: [language, count]

    ServiceRecord:
      type: object
      properties:
        id:
          type: integer
        publicName:
          type: ["string", "null"]
        officialName:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        physicalCity:
          type: ["string", "null"]
        physicalCounty:
          type: ["string", "null"]
        eligibilityByAge:
          type: ["string", "null"]
        eligibilityAgeGroup:
          type: ["string", "null"]
        eligibilityByGender:
          type: ["string", "null"]
        languagesOfferedList:
          type: ["string", "null"]
        bilingualService:
          type: ["boolean", "null"]
        lgbtqSupport:
          type: ["boolean", "null"]
        harmReduction:
          type: ["boolean", "null"]
        normalWaitTime:
          type: ["string", "null"]
        websiteAddress:
          type: ["string", "null"]
      required:
        - id
        - publicName
        - officialName
        - category
        - physicalCity
        - physicalCounty
        - eligibilityByAge
        - eligibilityAgeGroup
        - eligibilityByGender
        - languagesOfferedList
        - bilingualService
        - lgbtqSupport
        - harmReduction
        - normalWaitTime
        - websiteAddress
